<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TPS3R Setia Karya</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { font-family: Arial; background:#eef2f7; margin:0; text-align:center;}
input, button { padding:10px; margin:5px; width:90%; max-width:300px;}
button { cursor:pointer; background:#2c7a7b; color:white; border:none; border-radius:5px;}
table { width:95%; margin:auto; border-collapse:collapse;}
th,td { border:1px solid #ccc; padding:8px;}
th { background:#2c7a7b; color:white;}
.dashboard { display:flex; flex-wrap:wrap; justify-content:center; gap:10px;}
.box { padding:15px; border-radius:10px; color:white; width:150px;}
.saldo { background:#3182ce;}
.masuk { background:#38a169;}
.keluar { background:#e53e3e;}
.modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);}
.modal-content { background:white; padding:20px; margin:15% auto; width:300px;}
</style>
</head>

<body>

<h2>TPS3R Setia Karya</h2>

<div id="login">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
<button onclick="login()">Login / Daftar</button>
</div>

<div id="app" style="display:none;">
<button onclick="logout()">Logout</button>

<div class="dashboard">
<div class="box saldo"><h4>Saldo</h4><p id="saldo">0</p></div>
<div class="box masuk"><h4>Masuk</h4><p id="masukTotal">0</p></div>
<div class="box keluar"><h4>Keluar</h4><p id="keluarTotal">0</p></div>
</div>

<input type="date" id="tanggal">
<input type="text" id="uraian" placeholder="Uraian">
<input type="text" id="masuk">
<input type="text" id="keluar">
<button onclick="tambah()">Tambah</button>

<input type="month" id="bulan">
<button onclick="tampil()">Filter</button>
<button onclick="exportExcel()">Export Excel</button>

<table>
<thead>
<tr><th>No</th><th>Tanggal</th><th>Uraian</th><th>Masuk</th><th>Keluar</th><th>Saldo</th><th>Aksi</th></tr>
</thead>
<tbody id="tabel"></tbody>
</table>
</div>

<div id="modal" class="modal">
<div class="modal-content">
<input type="date" id="etanggal">
<input type="text" id="euraian">
<input type="text" id="emasuk">
<input type="text" id="ekeluar">
<button onclick="update()">Update</button>
<button onclick="tutup()">Batal</button>
</div>
</div>

<script>

// 🔥 GANTI CONFIG INI DARI FIREBASE
const firebaseConfig = {
  apiKey: "ISI",
  authDomain: "ISI",
  projectId: "ISI"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let data=[], editId=null;

function login(){
let e=email.value, p=password.value;
auth.signInWithEmailAndPassword(e,p)
.catch(()=>auth.createUserWithEmailAndPassword(e,p));
}

function logout(){ auth.signOut(); }

auth.onAuthStateChanged(u=>{
if(u){
login.style.display="none";
app.style.display="block";
ambil();
}else{
login.style.display="block";
app.style.display="none";
}
});

function tambah(){
db.collection("kas").add({
tanggal:tanggal.value,
uraian:uraian.value,
masuk:parseInt(masuk.value.replace(/\./g,''))||0,
keluar:parseInt(keluar.value.replace(/\./g,''))||0
});
}

function ambil(){
db.collection("kas").orderBy("tanggal")
.onSnapshot(s=>{
data=[];
s.forEach(d=>data.push({id:d.id,...d.data()}));
tampil();
});
}

function tampil(){
let t="", saldo=0, tm=0, tk=0, b=bulan.value, no=1;

data.forEach(d=>{
if(b && !d.tanggal.startsWith(b)) return;
saldo+=d.masuk-d.keluar;
tm+=d.masuk; tk+=d.keluar;

t+=`<tr>
<td>${no++}</td>
<td>${d.tanggal}</td>
<td>${d.uraian}</td>
<td>${rp(d.masuk)}</td>
<td>${rp(d.keluar)}</td>
<td>${rp(saldo)}</td>
<td>
<button onclick="edit('${d.id}','${d.tanggal}','${d.uraian}',${d.masuk},${d.keluar})">✏️</button>
<button onclick="hapus('${d.id}')">🗑️</button>
</td>
</tr>`;
});

tabel.innerHTML=t;
saldo.innerText=rp(saldo);
masukTotal.innerText=rp(tm);
keluarTotal.innerText=rp(tk);
}

function hapus(id){
if(confirm("Hapus data?")) db.collection("kas").doc(id).delete();
}

function edit(id,t,u,m,k){
editId=id;
etanggal.value=t;
euraian.value=u;
emasuk.value=rp(m);
ekeluar.value=rp(k);
modal.style.display="block";
}

function tutup(){ modal.style.display="none"; }

function update(){
db.collection("kas").doc(editId).update({
tanggal:etanggal.value,
uraian:euraian.value,
masuk:parseInt(emasuk.value.replace(/\./g,''))||0,
keluar:parseInt(ekeluar.value.replace(/\./g,''))||0
});
tutup();
}

function rp(x){ return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g,"."); }

masuk.oninput=e=>e.target.value=rp(e.target.value.replace(/\D/g,''));
keluar.oninput=e=>e.target.value=rp(e.target.value.replace(/\D/g,''));

function exportExcel(){
let ws=[["Tanggal","Uraian","Masuk","Keluar"]];
data.forEach(d=>ws.push([d.tanggal,d.uraian,d.masuk,d.keluar]));
let wb=XLSX.utils.book_new();
let sheet=XLSX.utils.aoa_to_sheet(ws);
XLSX.utils.book_append_sheet(wb,sheet,"Kas");
XLSX.writeFile(wb,"kas.xlsx");
}

</script>
</body>
</html>
